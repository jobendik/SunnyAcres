<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7ec850">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sunny Acres">
<meta name="format-detection" content="telephone=no">
<title>Sunny Acres — A Farming Adventure</title>
</head>
<body>
<div id="game-root">
  <canvas id="world"></canvas>

  <!-- Top HUD: two tiers (primary + secondary) -->
  <div class="hud-top">
    <div class="hud-top-row hud-top-primary">
      <div class="badge level-badge" id="level-badge">
        <span class="lv-prefix">Lv </span><span id="level-num">1</span>
      </div>
      <div class="xp-bar-wrap">
        <div class="xp-bar">
          <div class="xp-fill" id="xp-fill"></div>
          <div class="xp-bar-label" id="xp-label">0 / 10 XP</div>
        </div>
      </div>
      <div class="badge coin-badge" id="coin-badge">
        <span class="icon" id="coin-ico"></span>
        <span id="coin-amount">100</span>
      </div>
    </div>
    <div class="hud-top-row hud-top-secondary">
      <div class="badge weather-badge" id="weather-badge" title="Weather">
        <span id="weather-emoji">☀️</span>
        <span class="badge-label" id="weather-name">Sunny</span>
      </div>
      <div class="badge season-badge" id="season-badge" title="Season">
        <span id="season-emoji">🌷</span>
        <span class="badge-label" id="season-name">Spring</span>
      </div>
      <div class="badge day-badge" id="day-badge" title="Day"><span id="day-num">Day 1</span></div>
      <div class="hud-spacer"></div>
      <button class="badge icon-badge music-toggle" id="music-toggle" title="Toggle music" aria-label="Toggle music">🎵</button>
    </div>
  </div>

  <!-- Floating Quests/Orders button (mobile) -->
  <button class="fab fab-quests" id="open-quests-fab" aria-label="Quests and orders">
    <span class="fab-ico">📋</span>
    <span class="fab-badge" id="quests-fab-badge" hidden>0</span>
  </button>

  <!-- Side panel: Quests + Orders -->
  <div class="side-panel" id="side-panel">
    <button class="side-panel-close" id="side-panel-close" aria-label="Close">×</button>
    <h3 class="side-panel-title">⭐ Quests</h3>
    <div id="quests-list"></div>
    <h3 class="side-panel-title">📋 Orders</h3>
    <div id="orders-list"></div>
  </div>
  <div class="side-panel-scrim" id="side-panel-scrim"></div>

  <!-- Objective rail: next best action -->
  <div id="objective-rail" class="objective-rail"></div>

  <!-- Event banner -->
  <div id="event-banner" class="event-banner"></div>

  <!-- Choice event modal (custom, non-blocking) -->
  <div id="choice-event-overlay" class="choice-overlay" hidden>
    <div class="choice-box">
      <div class="choice-icon" id="choice-icon">📜</div>
      <div class="choice-title" id="choice-title">Event</div>
      <div class="choice-story" id="choice-story"></div>
      <div class="choice-actions" id="choice-actions"></div>
      <button class="choice-skip" id="choice-skip">Maybe later</button>
    </div>
  </div>

  <!-- Tutorial bubble (non-blocking) -->
  <div id="tutorial-bubble" class="tutorial-bubble" hidden>
    <div class="tutorial-step" id="tutorial-step"></div>
    <div class="tutorial-text" id="tutorial-text"></div>
    <button class="tutorial-skip" id="tutorial-skip">Skip</button>
  </div>

  <!-- Active placement banner (mobile-friendly cancel) -->
  <div id="placing-banner" class="placing-banner" hidden>
    <span id="placing-text">Tap a tile to place</span>
    <button id="placing-cancel" class="placing-cancel">Cancel</button>
  </div>

  <!-- Bottom action bar: primary tools always visible -->
  <div class="hud-bottom">
    <div class="action-bar action-bar-primary">
      <button class="btn tool-btn" data-tool="hand" title="Hand (interact)" aria-label="Hand">
        <span class="ico" id="ico-hand"></span>
        <span class="btn-label">Hand</span>
      </button>
      <button class="btn tool-btn" data-tool="plow" title="Plow soil" aria-label="Plow">
        <span class="ico" id="ico-plow"></span>
        <span class="btn-label">Plow</span>
      </button>
      <button class="btn tool-btn" data-tool="seed" title="Plant seeds" aria-label="Plant seeds">
        <span class="ico" id="ico-seed"></span>
        <span class="btn-label" id="seed-btn-label">Seeds<small>Wheat</small></span>
      </button>
      <button class="btn" id="open-shop" title="Shop" aria-label="Shop">
        <span class="ico" id="ico-shop"></span>
        <span class="btn-label">Shop<small>Buy/Sell</small></span>
      </button>
      <button class="btn" id="open-buildings" title="Buildings" aria-label="Build">
        <span class="ico" id="ico-build"></span>
        <span class="btn-label">Build<small>Animals</small></span>
      </button>
      <button class="btn btn-more desktop-hide" id="open-more" title="More" aria-label="More options">
        <span class="ico ico-more">⋯</span>
        <span class="btn-label">More</span>
      </button>
      <button class="btn mobile-hide" id="open-inventory" title="Inventory" aria-label="Inventory">
        <span class="ico" id="ico-inv"></span>
        <span class="btn-label">Barn<small>Goods</small></span>
      </button>
      <button class="btn mobile-hide" id="open-decor" title="Decorations" aria-label="Decorations">
        <span class="ico" id="ico-decor"></span>
        <span class="btn-label">Decor<small>Beauty</small></span>
      </button>
      <button class="btn mobile-hide" id="open-achievements" title="Achievements" aria-label="Achievements">
        <span class="ico" id="ico-trophy"></span>
        <span class="btn-label">Awards<small>Goals</small></span>
      </button>
      <button class="btn mobile-hide" id="open-news" title="Daily News" aria-label="News">
        <span class="ico" id="ico-news"></span>
        <span class="btn-label">News<small>Today</small></span>
      </button>
      <button class="btn mobile-hide" id="open-daily" title="Daily" aria-label="Daily">
        <span class="ico-emoji">🌅</span>
        <span class="btn-label">Daily<small>Streak</small></span>
      </button>
      <button class="btn mobile-hide" id="open-weather-grid" title="Weather Grid" aria-label="Weather Grid">
        <span class="ico-emoji">🌦️</span>
        <span class="btn-label">Grid<small>Weather</small></span>
      </button>
      <button class="btn mobile-hide" id="open-spec" title="Specialization" aria-label="Specialization">
        <span class="ico-emoji">🌟</span>
        <span class="btn-label">Path<small>Spec</small></span>
      </button>
      <button class="btn mobile-hide" id="open-collection" title="Collection" aria-label="Collection">
        <span class="ico-emoji">📖</span>
        <span class="btn-label">Codex<small>Find</small></span>
      </button>
      <button class="btn mobile-hide" id="save-btn" title="Save" aria-label="Save game">
        <span class="ico" id="ico-save"></span>
        <span class="btn-label">Save<small>Game</small></span>
      </button>
      <button class="btn mobile-hide" id="help-btn" title="Help" aria-label="Help">
        <span class="ico" id="ico-help"></span>
        <span class="btn-label">Help<small>?</small></span>
      </button>
    </div>
  </div>

  <!-- More menu bottom-sheet (mobile) -->
  <div class="sheet-scrim" id="more-scrim"></div>
  <div class="bottom-sheet" id="more-sheet" aria-hidden="true">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-title">More</div>
    <div class="bottom-sheet-grid" id="more-grid">
      <button class="sheet-btn" data-more="open-daily">
        <span class="ico-emoji">🌅</span>
        <span>Daily</span>
      </button>
      <button class="sheet-btn" data-more="open-weather-grid">
        <span class="ico-emoji">🌦️</span>
        <span>Grid</span>
      </button>
      <button class="sheet-btn" data-more="open-spec">
        <span class="ico-emoji">🌟</span>
        <span>Path</span>
      </button>
      <button class="sheet-btn" data-more="open-collection">
        <span class="ico-emoji">📖</span>
        <span>Codex</span>
      </button>
      <button class="sheet-btn" data-more="open-market">
        <span class="ico-emoji">💱</span>
        <span>Market</span>
      </button>
      <button class="sheet-btn" data-more="open-leaderboard">
        <span class="ico-emoji">🏅</span>
        <span>Ranks</span>
      </button>
      <button class="sheet-btn" data-more="open-prestige">
        <span class="ico-emoji">✨</span>
        <span>Prestige</span>
      </button>
      <button class="sheet-btn" data-more="open-snapshot">
        <span class="ico-emoji">🖼️</span>
        <span>Share</span>
      </button>
      <button class="sheet-btn" data-more="open-inventory">
        <span class="ico" id="ico-inv-m"></span>
        <span>Barn</span>
      </button>
      <button class="sheet-btn" data-more="open-decor">
        <span class="ico" id="ico-decor-m"></span>
        <span>Decor</span>
      </button>
      <button class="sheet-btn" data-more="open-achievements">
        <span class="ico" id="ico-trophy-m"></span>
        <span>Awards</span>
      </button>
      <button class="sheet-btn" data-more="open-news">
        <span class="ico" id="ico-news-m"></span>
        <span>News</span>
      </button>
      <button class="sheet-btn" data-more="save-btn">
        <span class="ico" id="ico-save-m"></span>
        <span>Save</span>
      </button>
      <button class="sheet-btn" data-more="help-btn">
        <span class="ico" id="ico-help-m"></span>
        <span>Help</span>
      </button>
      <button class="sheet-btn" id="music-toggle-sheet">
        <span class="ico-emoji" id="music-toggle-sheet-icon">🎵</span>
        <span>Music</span>
      </button>
      <button class="sheet-btn" id="recenter-btn">
        <span class="ico-emoji">🎯</span>
        <span>Re-center</span>
      </button>
    </div>
  </div>

  <!-- Hidden trigger buttons (so they can be clicked from More menu) -->
  <div style="display:none">
    <button id="open-market" type="button"></button>
    <button id="open-leaderboard" type="button"></button>
    <button id="open-prestige" type="button"></button>
    <button id="open-snapshot" type="button"></button>
  </div>

  <!-- Generic Modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span id="modal-title">Shop</span>
        <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      </div>
      <div class="modal-tabs" id="modal-tabs"></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div id="toasts"></div>
  <div id="tooltip"></div>

  <!-- Fishing minigame overlay -->
  <div id="fishing-overlay" class="fishing-overlay">
    <div class="fishing-box">
      <div class="fishing-title">🎣 Fishing!</div>
      <div class="fishing-track">
        <div class="fishing-zone" id="fishing-zone"></div>
        <div class="fishing-marker" id="fishing-marker"></div>
      </div>
      <div class="fishing-hint">Tap when the marker is in the green zone!</div>
      <button class="fishing-btn" id="fishing-tap">HOOK!</button>
      <button class="fishing-btn cancel" id="fishing-cancel">Walk away</button>
    </div>
  </div>

  <!-- Quest complete burst -->
  <div id="quest-burst" class="quest-burst"></div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
